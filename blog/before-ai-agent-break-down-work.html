<!doctype html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI agent를 만들기 전에 업무부터 분해해야 합니다</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="../styles.css"></head><body><header class="nav"><a class="brand" href="../index.html"><span class="mark"></span>AI Workflow Studio</a><nav><a href="../index.html#case-studies">Cases</a><a href="./index.html">Blog</a><a class="nav-cta" href="../index.html#diagnosis">진단 신청</a></nav></header><article class="article"><span class="tag">Article</span><h1>AI agent를 만들기 전에 업무부터 분해해야 합니다</h1><p>Agent는 마법의 직원이 아닙니다. 좋은 agent는 잘게 분해된 업무 위에서 작동합니다.</p><div class="article-card"><h2>핵심</h2><p>먼저 업무를 입력, 판단, 처리, 검수, 전달 단계로 나눠야 합니다. 그 다음 AI가 맡을 부분과 사람이 판단할 부분을 정해야 합니다.</p><ul><li>반복 업무를 찾는다</li><li>업무 단계를 분해한다</li><li>AI와 사람이 맡을 일을 나눈다</li><li>팀 도구와 연결한다</li></ul></div><p><a class="button primary" href="../index.html#diagnosis">AI Workflow 진단받기</a></p></article></body></html>
